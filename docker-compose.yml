# TestAI Platform - Docker Compose
# Python Harness (host 8001 → container 8000) + PostgreSQL + Next.js Frontend (host 3001 → container 3000)

services:
  postgres:
    image: postgres:16-alpine
    container_name: testai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: testai
      POSTGRES_PASSWORD: testai
      POSTGRES_DB: testai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testai -d testai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://testai:testai@postgres:5432/testai
      - TESTAI_HOME=/app/.testai
      - AGENT_WORKSPACE_MOUNT=/app/agent_workspace
      - ALLOW_PRIVATE_URLS=true
      - TESTAI_ALLOW_PRIVATE_URLS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-v4-flash}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./.testai:/app/.testai:rw
      - ./agent_workspace:/app/agent_workspace:rw
      - ./backend/harness_data.db:/app/backend/harness_data.db:rw
      - ./backend/test.txt:/app/backend/test.txt:rw
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    container_name: testai-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8001
      - BACKEND_URL=http://backend:8000
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-v4-flash}
      - NEXT_PUBLIC_DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-v4-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: testai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    profiles:
      - production

volumes:
  pgdata:

networks:
  default:
    name: testai-network
